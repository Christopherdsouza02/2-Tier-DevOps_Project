apiVersion: v1
kind: Pod
metadata:
  name: 2-tier-app-pod

spec:
  containers:
    -name: two-tier-app-
    -image: cdsouza404/flaskapp:latest
     env:
      -name: MYSQL_HOST
       value: "mysql"
      -name: MYSQL-USER
       value: "root"
      -name: MYSQL_PASSWORD
       value: "admin"
      -name: MYSQL_DB
       value: "myDb"
    ports:
      - containerPort: 5000
    imagePullPolicy: Always
